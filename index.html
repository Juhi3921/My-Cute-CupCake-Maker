<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧁 My Cute Cupcake Maker 🧁</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="card">
    <h1>🧁 Cupcake Maker 🧁</h1>

    <div class="cupcake-box">
      <div class="cupcake" id="cupcake">
        <div class="cherry-stem" id="cherryStem"></div>
        <div class="cherry" id="cherry"></div>

        <div class="frosting" id="frosting">
          <div class="sprinkles" id="sprinkles"></div>
        </div>

        <div class="wrapper" id="wrapper">
          <div class="stripe"></div>
          <div class="stripe"></div>
          <div class="stripe"></div>
          <div class="stripe"></div>
        </div>
      </div>
    </div>

    <button id="mixButton">Mix a Cupcake! </button>

    <div class="recipe-box">
      <p> Frosting: <span id="frostingText">Strawberry</span></p>
      <p> Sprinkles: <span id="sprinklesText">Rainbow Stars</span></p>
      <p> Paper Cup: <span id="wrapperText">Pastel Blue</span></p>
      <p> Cherry: <span id="cherryText">Yes!</span></p>
    </div>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
